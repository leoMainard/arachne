# Configuration de base — surchargée par les configs d'expériences
data:
  source: "local"
  local_path: "data/tables_test.parquet"
  test_size: 0.2
  val_size: 0.1
  stratify: true
  random_seed: 42
  labels:
    - batiment
    - vehicule
    - sinistre
    - autre

preprocessing:
  header_rows: 1
  header_weight: 3
  max_content_cells: 200

training:
  cv_folds: 5
  scoring: "accuracy"

tracking:
  save_model: true
  output_dir: "models"
