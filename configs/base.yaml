# Configuration de base — surchargée par les configs d'expériences
data:
  source: "local"
  local_path: "data/tables_test.parquet"
  test_size: 0.2
  val_size: 0.1
  stratify: true
  random_seed: 42
  labels:
    - batiment
    - vehicule
    - sinistre
    - autre

preprocessing:
  header_rows: 1
  header_weight: 3
  max_content_cells: 200

training:
  cv_folds: 5
  scoring: "accuracy"
  entrainer_sur_train_val: false

tracking:
  save_model: true
  output_dir: "models"

stockage:
  local: true          # conserver les artefacts sur le disque local
  s3:
    actif: false       # activer l'upload vers S3
    access_key: ""
    secret_key: ""
    host: ""           # ex : "https://s3.eu-west-3.amazonaws.com" ou endpoint MinIO
    bucket_name: ""
    region: "eu-west-3"
    prefixe: "arachne/experiences/"  # préfixe commun à toutes les expériences
