experiment:
  name: "xgboost"
  description: "TF-IDF + XGBoost (gradient boosting haute performance)"

features:
  type: "tfidf"
  params:
    max_features: 10000
    ngram_range: [1, 2]
    sublinear_tf: true
    min_df: 2

model:
  type: "xgboost"
  params:
    n_estimators: 300
    learning_rate: 0.1
    max_depth: 6
    random_state: 42
    n_jobs: -1
