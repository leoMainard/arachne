experiment:
  name: "entetes_seuls_logistic"
  description: "Classification basée sur les en-têtes uniquement + LR"

preprocessing:
  header_rows: 1
  format_sortie: "entetes_seuls"   # contenu ignoré

features:
  type: "tfidf"
  params:
    max_features: 10000
    ngram_range: [1, 2]
    sublinear_tf: true
    min_df: 1

model:
  type: "logistic_regression"
  params:
    C: 1.0
    max_iter: 1000
    class_weight: "balanced"
    solver: "lbfgs"
