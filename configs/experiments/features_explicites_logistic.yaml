experiment:
  name: "features_explicites_logistic"
  description: "TF-IDF + features binaires par mots-clés métier + LR"

features:
  type: "features_explicites"
  params:
    max_features: 10000
    ngram_range: [1, 2]
    sublinear_tf: true
    min_df: 2

model:
  type: "logistic_regression"
  params:
    C: 1.0
    max_iter: 1000
    class_weight: "balanced"
    solver: "lbfgs"
