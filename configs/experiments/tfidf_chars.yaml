experiment:
  name: "tfidf_chars"
  description: "TF-IDF caractères (robuste aux fautes d'orthographe et encodages PDF)"

features:
  type: "tfidf"
  params:
    max_features: 20000
    ngram_range: [2, 4]
    sublinear_tf: true
    min_df: 2
    analyzer: "char_wb"

model:
  type: "logistic_regression"
  params:
    C: 1.0
    max_iter: 1000
    class_weight: "balanced"
    solver: "lbfgs"
