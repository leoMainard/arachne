experiment:
  name: "tfidf_random_forest"
  description: "TF-IDF + Random Forest"

features:
  type: "tfidf"
  params:
    max_features: 10000
    ngram_range: [1, 2]
    sublinear_tf: true
    min_df: 2

model:
  type: "random_forest"
  params:
    n_estimators: 300
    max_depth: null
    class_weight: "balanced"
    n_jobs: -1
    random_state: 42
