experiment:
  name: "tfidf_separe_logistic"
  description: "TF-IDF séparé sur en-têtes et contenu, concaténé + LR"

preprocessing:
  header_rows: 1
  format_sortie: "separe"

features:
  type: "tfidf_separe"
  params_entetes:
    max_features: 10000
    ngram_range: [1, 2]
    sublinear_tf: true
    min_df: 1
  params_contenu:
    max_features: 5000
    ngram_range: [1, 2]
    sublinear_tf: true
    min_df: 2

model:
  type: "logistic_regression"
  params:
    C: 1.0
    max_iter: 1000
    class_weight: "balanced"
    solver: "lbfgs"
