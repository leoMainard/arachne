experiment:
  name: "tfidf_complement_nb"
  description: "TF-IDF + Complement Naive Bayes (rapide, bon sur classes déséquilibrées)"

features:
  type: "tfidf"
  params:
    max_features: 15000
    ngram_range: [1, 2]
    sublinear_tf: true
    min_df: 2

model:
  type: "complement_nb"
  params:
    alpha: 0.1
    norm: true
